apiVersion: kyverno.io/v1
kind: Policy
metadata:
  name: enforce-resource-limits
  namespace: default
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-resources
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "All containers must specify CPU and memory limits."
        pattern:
          spec:
            containers:
              - resources:
                  limits:
                    memory: "?*"
                    cpu: "?*"