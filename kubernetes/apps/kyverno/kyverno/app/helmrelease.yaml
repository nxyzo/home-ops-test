---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
spec:
  interval: 1h
  chart:
    spec:
      chart: kyverno
      version: 1.17.1
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: kyverno
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    crds:
      reportServer: true
      migration:
        enable: true
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: {drop: ["ALL"]}
          privileged: false
          runAsGroup: 65534
          runAsNonRoot: true
          runAsUser: 65534
          seccompProfile:
            type: RuntimeDefault
        podResources:
          request:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
    config:
      excludeKyvernoNamespace: true
      resourceFiltersExcludeNamespaces:
        - kube-system
        - longhorn-system
        - network
        - cert-manager
    admissionController:
      replicas: 3
      serviceMonitor:
        enabled: true
    backgroundController:
      replicas: 3
      serviceMonitor:
        enabled: true
    cleanupController:
      replicas: 3
      serviceMonitor:
        enabled: true
    reportsController:
      replicas: 3
      serviceMonitor:
        enabled: true
