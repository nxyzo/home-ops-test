---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: papra
spec:
  chartRef:
    kind: OCIRepository
    name: papra
  interval: 1h
  values:
    controllers:
      papra:
        replicas: 1
        containers:
          papra:
            image:
              repository: ghcr.io/papra-hq/papra
              tag: 26.2.2-rootless@sha256:1eaefed5fb049afa2456e0cd73e48a54addbca279af39c72dff7de730549730e
            env:
              - name: PORT
                value: &port 1221
              # - name: PROCESS_MODE
              #   value: "all"
              - name: APP_BASE_URL
                value: "https://{{ .Release.Name }}.home-ops.dev.nxyzo.com"
              # - name: DOCUMENTS_OCR_LANGUAGES
              #   value: "eng, ger"
              - name: DOCUMENT_STORAGE_MAX_UPLOAD_SIZE
                value: 0
              - name: TZ
                value: "Europe/Berlin"
              - name: AUTH_SECRET
                valueFrom:
                  secretKeyRef:
                    name: papra-auth
                    key: AUTH_SECRET
            probes:
              liveness: &probes
                enabled: true
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 25m
              limits:
                  memory: 4Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      papra:
        ports:
          http:
            port: *port

    route:
      papra:
        hostnames:
          - "{{ .Release.Name }}.home-ops.dev.nxyzo.com"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        storageClass: nfs-k8s
        accessMode: ReadWriteMany
        size: 10Gi
        globalMounts:
          - path: /app/app-data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp