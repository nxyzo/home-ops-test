---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-ngx
spec:
  chartRef:
    kind: OCIRepository
    name: paperless-ngx
  interval: 1h
  values:
    controllers:
      paperless-ngx:
        replicas: 1
        initContainers:
          fix-run:
            image:
              repository: busybox
              tag: "1.36"
            command:
              - sh
              - -c
              - |
                mkdir -p /run
                chown 1000:1000 /run
                chmod 755 /run
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]

        containers:
          app:
            image:
              repository: ghcr.io/paperless-ngx/paperless-ngx
              tag: 2.20.9@sha256:1d99ede700ffdf7aa44899b5fee29c8c279f175769b6cb295e91e9f15772728e
            env:
              - name: PORT
                value: &port 1221
              # - name: PROCESS_MODE
              #   value: "all"
              - name: APP_BASE_URL
                value: "https://{{ .Release.Name }}.nxyzo.com"
              # - name: DOCUMENTS_OCR_LANGUAGES
              #   value: "eng, ger"
              - name: DOCUMENT_STORAGE_MAX_UPLOAD_SIZE
                value: 0
              - name: TZ
                value: "Europe/Berlin"
              - name: AUTH_SECRET
                valueFrom:
                  secretKeyRef:
                    name: papra-auth
                    key: AUTH_SECRET
            probes:
              liveness: &probes
                enabled: true
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 25m
              limits:
                  memory: 4Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      papra:
        ports:
          http:
            port: *port

    route:
      papra:
        hostnames:
          - "{{ .Release.Name }}.nxyzo.com"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        storageClass: nfs-k8s
        accessMode: ReadWriteMany
        size: 10Gi
        globalMounts:
          - path: /app/app-data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      run:
        type: emptyDir
        advancedMounts:
          papra:
            app:
              - path: /run
            fix-run:
              - path: /run