apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: backup-example-cluster-test
spec:
  suspend: false # To temporarily stop scheduled backups from running
  schedule: "03 22 * * * *"  # At midnight every day
  immediate: true
  backupOwnerReference: self
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  cluster:
    name: cluster-example
  # method: plugin, volumeSnapshot, or barmanObjectStore (default)