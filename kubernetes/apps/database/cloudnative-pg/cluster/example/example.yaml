apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cluster-example
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:18
  primaryUpdateStrategy: unsupervised
  primaryUpdateMethod: switchover
  failoverDelay: 2
  instances: 3

  storage:
    size: 1Gi

  # monitoring:
  #   enablePodMonitor: true
  #   podMonitorMetricRelabelings:
  #     - sourceLabels:
  #         - cluster
  #       targetLabel: cnpg_cluster
  #       action: replace
  #     - regex: cluster
  #       action: labeldrop
  postgresql:
    parameters:
      archive_timeout: 60s
      idle_in_transaction_session_timeout: "300000" # 5min

  resources:
    requests:
      memory: 800Mi
      cpu: 200m
    limits:
      memory: 2Gi

  superuserSecret:
    name: "{{ .Release.Name }}-superuser-secret"
  enableSuperuserAccess: true

  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true

  plugins:
  - name: barman-cloud.cloudnative-pg.io
    isWALArchiver: true
    parameters:
      barmanObjectName: backup-cluster-example

  managed:
    roles:
    - name: test-user
      ensure: present
      comment: test-user
      login: true
      superuser: false
      inRoles:
        - pg_monitor
        - pg_signal_backend
      passwordSecret:
        name: cluster-example-test-user

  # Note: previousCluster needs to be set to the name of the previous cluster
  # when recovering from an existing cnpg cluster
  # bootstrap:
  #   recovery:
  #     source: &previousCluster postgres16-v2
  #     recoveryTarget:
  #       targetTime: "2024-08-19 20:30:00.00000+02"
  # # Note: externalClusters is needed when recovering from an existing cnpg
  # # cluster
  # externalClusters:
  #   - name: *previousCluster
  #     barmanObjectStore:
  #       <<: *barmanObjectStore
  #       serverName: *previousCluster