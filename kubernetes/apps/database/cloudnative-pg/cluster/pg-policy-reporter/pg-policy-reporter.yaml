apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-policy-reporter
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:18
  primaryUpdateStrategy: unsupervised
  primaryUpdateMethod: switchover
  failoverDelay: 2
  instances: 3

  enableSuperuserAccess: false

  storage:
    size: 2Gi

  postgresql:
    parameters:
      archive_timeout: 60s
      idle_in_transaction_session_timeout: "300000" # 5min

  resources:
    requests:
      memory: 800Mi
      cpu: 200m
    limits:
      memory: 2Gi

  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: backup-pg-policy-reporter

  bootstrap:
    initdb:
      database: policy-reporter
      owner: pg-policy-reporter-owner
      secret:
        name: pg-policy-reporter-owner

  managed:
    roles:
      - name: pg-policy-reporter-app
        ensure: present
        login: true
        superuser: false
        createdb: false
        createrole: false
        replication: false
        bypassrls: false
        comment: Runtime application user for policy-reporter
        passwordSecret:
          name: pg-policy-reporter-app

      - name: pg-policy-reporter-ro
        ensure: present
        login: true
        superuser: false
        createdb: false
        createrole: false
        replication: false
        bypassrls: false
        comment: Optional read-only user for policy-reporter
        passwordSecret:
          name: pg-policy-reporter-ro