---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pgadmin
  namespace: database
spec:
  chartRef:
    kind: OCIRepository
    name: pgadmin
  interval: 1h
  values:
    controllers:
      pgadmin:
        containers:
          app:
            image:
              repository: dpage/pgadmin4
              tag: 9.14@sha256:ff557f69d9808085dc3554f56c1b06a36ac8cddabe4485212920b9604261abdb
              pullPolicy: IfNotPresent
            env:
              PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
            envFrom:
              - secretRef:
                  name: pgadmin-secret
            probes:
              liveness: &probes
                enabled: true
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 15m
                memory: 200M
              limits:
                memory: 300M
            # securityContext:
            #   allowPrivilegeEscalation: true
            #   readOnlyRootFilesystem: false
            #   capabilities: {drop: ["ALL"]}
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 5050
            runAsGroup: 5050
            fsGroup: 5050
            fsGroupChangePolicy: OnRootMismatch
    service:
      main:
        controller: pgadmin
        ports:
          http:
            port: &port 80
    route:
      pgadmin:
        hostnames:
          - "{{ .Release.Name }}.nxyzo.com"
        parentRefs:
          - name: envoy-internal
            namespace: network

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /var/lib/pgadmin

      servers:
        enabled: true
        type: configMap
        name: pgadmin-config
        advancedMounts:
          pgadmin:
            app:
              - path: /pgadmin4/servers.json
                subPath: servers.json
                readOnly: true