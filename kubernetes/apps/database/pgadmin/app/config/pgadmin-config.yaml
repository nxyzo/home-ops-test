apiVersion: v1
kind: ConfigMap
metadata:
  name: pgadmin-config
data:
  servers.json: |
    {
      "Servers": {
        "1": {
          "Name": "test-db",
          "Group": "Servers",
          "Host": "cluster-example-rw.database.svc.cluster.local",
          "Port": 5432,
          "MaintenanceDB": "test-db",
          "Username": "test-user",
          "SSLMode": "prefer"
        }
      }
    }