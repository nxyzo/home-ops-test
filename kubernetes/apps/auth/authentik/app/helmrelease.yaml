---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app authentik
  namespace: auth
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app

  install:
    remediation:
      retries: -1

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  values:
    postgresql:
      enabled: false

    global:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

    authentik:
      secret_key: file:///authentik-secret/secret_key
      postgresql:
        host: pg-authentik-rw.database.svc.cluster.local
        name: authentik
        user: file:///postgres-creds/username
        password: file:///postgres-creds/password
        port: 5432

      # email:
      #   host: ""
      #   port: 587
      #   username: ""
      #   password: ""
      #   use_tls: false
      #   use_ssl: false
      #   timeout: 30
      #   from: ""

    server:
      enabled: true
      replicas: 2

      volumes:
        - name: postgres-creds
          secret:
            secretName: pg-authentik
        - name: authentik-secret
          secret:
            secretName: authentik-secret

      volumeMounts:
        - name: postgres-creds
          mountPath: /postgres-creds
          readOnly: true
        - name: authentik-secret
          mountPath: /authentik-secret
          readOnly: true

      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containerSecurityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL

      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1Gi

      pdb:
        enabled: true
        minAvailable: 1

      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          interval: 30s
          scrapeTimeout: 3s

      livenessProbe:
        failureThreshold: 3
        initialDelaySeconds: 5
        periodSeconds: 10
        successThreshold: 1
        timeoutSeconds: 3
        httpGet:
          path: "{{ .Values.authentik.web.path }}-/health/live/"
          port: http

      readinessProbe:
        failureThreshold: 3
        initialDelaySeconds: 5
        periodSeconds: 10
        successThreshold: 1
        timeoutSeconds: 3
        httpGet:
          path: "{{ .Values.authentik.web.path }}-/health/ready/"
          port: http

      startupProbe:
        failureThreshold: 60
        initialDelaySeconds: 5
        periodSeconds: 10
        successThreshold: 1
        timeoutSeconds: 3
        httpGet:
          path: "{{ .Values.authentik.web.path }}-/health/live/"
          port: http

      route:
        main:
          enabled: true
          hostnames:
            - authentik.nxyzo.com
          parentRefs:
            - name: envoy-internal
              namespace: network
          matches:
            - path:
                type: PathPrefix
                value: "{{ .Values.authentik.web.path }}"

    worker:
      enabled: true
      replicas: 2

      volumes:
        - name: postgres-creds
          secret:
            secretName: pg-authentik
        - name: authentik-secret
          secret:
            secretName: authentik-secret

      volumeMounts:
        - name: postgres-creds
          mountPath: /postgres-creds
          readOnly: true
        - name: authentik-secret
          mountPath: /authentik-secret
          readOnly: true

      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containerSecurityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL

      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1Gi

      pdb:
        enabled: true
        minAvailable: 1

      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          interval: 30s
          scrapeTimeout: 3s

      livenessProbe:
        failureThreshold: 3
        initialDelaySeconds: 5
        periodSeconds: 10
        successThreshold: 1
        timeoutSeconds: 3
        exec:
          command:
            - ak
            - healthcheck

      readinessProbe:
        failureThreshold: 3
        initialDelaySeconds: 5
        periodSeconds: 10
        successThreshold: 1
        timeoutSeconds: 3
        exec:
          command:
            - ak
            - healthcheck

      startupProbe:
        failureThreshold: 60
        initialDelaySeconds: 30
        periodSeconds: 10
        successThreshold: 1
        timeoutSeconds: 3
        exec:
          command:
            - ak
            - healthcheck

    prometheus:
      rules:
        enabled: true
        namespace: monitoring